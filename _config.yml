# -----------------------------------------------------------------------------
# Site settings
# -----------------------------------------------------------------------------

title: zamanian lab
first_name: Mostafa
middle_name:
last_name: Zamanian
email: mzamanian@wisc.edu
description: >
  Zamanian Lab — Department of Pathobiological Sciences, University of Wisconsin—Madison.
footer_text: >
  Powered by <a href="https://jekyllrb.com/" target="_blank">Jekyll</a> and hosted by
  <a href="https://pages.github.com/" target="_blank">GitHub Pages</a>

keywords: Zamanian Lab, UW-Madison, parasitology, helminths, neglected tropical diseases
lang: en
icon: ⚛️

url: https://zamanianlab.github.io
baseurl:
last_updated: true

# -----------------------------------------------------------------------------
# Layout
# -----------------------------------------------------------------------------

navbar_fixed: true
footer_fixed: true
max_width: 920px

# -----------------------------------------------------------------------------
# Optional features
# -----------------------------------------------------------------------------

enable_google_analytics:    false
enable_masonry:             false
enable_math:                false
enable_tooltips:            false
enable_darkmode:            false
enable_navbar_social:       true
enable_medium_zoom:         true
enable_progressbar:         true

# -----------------------------------------------------------------------------
# Open Graph (disabled)
# -----------------------------------------------------------------------------

serve_og_meta: false
serve_schema_org: false
og_image:

# -----------------------------------------------------------------------------
# Analytics
# -----------------------------------------------------------------------------

google_analytics: G-PJS9929EQ7
enable_cronitor_analytics: false
enable_google_verification: false
enable_bing_verification:   false

# -----------------------------------------------------------------------------
# Jekyll settings
# -----------------------------------------------------------------------------

markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter_opts:
    css_class: 'highlight'
    span:
      line_numbers: false
    block:
      line_numbers: false
      start_line: 1

include: ['_pages']
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
keep_files:
  - CNAME
  - .nojekyll
  - .git

plugins:
  - jekyll-email-protect
  - jekyll-imagemagick
  - jekyll/scholar
  - jekyll-sitemap

# Sitemap: exclude assets from indexing
defaults:
  - scope:
      path: "assets"
    values:
      sitemap: false

# -----------------------------------------------------------------------------
# Jekyll Scholar
# -----------------------------------------------------------------------------

scholar:
  last_name: [Zamanian]
  first_name: [Mostafa]

  style: apa
  locale: en

  source: /_data/
  bibliography: papers.bib
  bibliography_template: bib

  bibtex_filters: [latex, smallcaps, superscript]
  replace_strings: true
  join_strings: true

  details_dir: bibliography
  details_layout: bibtex.html
  details_link: Details

  query: "@*"
  group_by: year
  group_order: descending

badges:
  altmetric_badge: false
  dimensions_badge: false

filtered_bibtex_keywords: [abbr, abstract, arxiv, bibtex_show, html, pdf, selected, supp, blog, code, poster, slides, website, preview, altmetric]

max_author_limit:
more_authors_animation_delay: 10

# -----------------------------------------------------------------------------
# Responsive WebP Images (jekyll-imagemagick)
# -----------------------------------------------------------------------------

imagemagick:
  enabled: false
  widths:
    - 480
    - 800
    - 1400
  input_directories:
    - assets/img/
  input_formats:
    - ".jpg"
    - ".jpeg"
    - ".png"
    - ".tiff"
  output_formats:
    webp: "-resize 800x"

